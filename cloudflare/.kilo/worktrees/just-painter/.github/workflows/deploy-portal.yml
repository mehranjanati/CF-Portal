name: Deploy Portal to Cloudflare Pages

on:
  push:
    branches:
      - main
    paths:
      - 'portal/**'
      - '.github/workflows/deploy-portal.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        working-directory: ./portal
        run: npm ci || npm install

      - name: Build Project
        working-directory: ./portal
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy portal/build --project-name portal-cloudflare --commit-dirty=true
